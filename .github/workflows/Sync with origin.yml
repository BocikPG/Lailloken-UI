name: Upstream Sync & Release
on:
  # Check every 6 hours
  schedule:
    - cron: '0 */6 * * *'
  # Allow manual trigger
  workflow_dispatch:
# ===== CHANGE THESE =====
env:
  UPSTREAM_REPO: 'Lailloken/Exile-UI'   # e.g., 'kubernetes/kubernetes'
  UPSTREAM_BRANCH: 'main'                # Branch to sync from upstream
  FORK_BRANCH: 'main'                    # Your fork's default branch
  RELEASE_TAG_SUFFFIX: '.1'              # Your tags will be 'v1.2.3.1'
permissions:
  contents: write    # Needed to push tags and create releases
jobs:
  sync-and-release:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout your fork over SSH using the deploy key. This is what lets
      #    the push in step 5 bypass branch protection - add "Deploy keys" to
      #    your ruleset's bypass list for FORK_BRANCH (see the deploy-key setup
      #    notes: generate a key, add the public half as a repo deploy key with
      #    write access, and store the private half as the SYNC_DEPLOY_KEY secret).
      - name: Checkout your fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.SYNC_DEPLOY_KEY }}
      # 2. Setup Git identity
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      # 3. Add upstream remote (read-only, https is fine here - we only fetch from it)
      - name: Add upstream remote
        run: git remote add upstream https://github.com/${{ env.UPSTREAM_REPO }}.git
      # 4. Fetch upstream's branch and tags
      - name: Fetch upstream
        run: |
          git fetch upstream ${{ env.UPSTREAM_BRANCH }} --tags --force
      # 5. Merge upstream into your fork's branch and push directly over SSH.
      #    No pull request is created, so this isn't subject to required-review
      #    rules - only to the ruleset's deploy-key bypass for direct pushes.
      #    If there's a merge conflict, this step fails and the workflow stops;
      #    you'll need to resolve it manually and rerun.
      - name: Merge upstream into fork branch
        run: |
          git checkout ${{ env.FORK_BRANCH }}
          git merge upstream/${{ env.UPSTREAM_BRANCH }} --no-ff -m "Merge upstream ${{ env.UPSTREAM_REPO }}@${{ env.UPSTREAM_BRANCH }}"
          git push origin ${{ env.FORK_BRANCH }}
      # 6. Get the latest release tag from the upstream repo, and work out
      #    the tag we'll actually push, inserting RELEASE_TAG_SUFFFIX right
      #    after the version core (e.g. v1.62.7) and BEFORE any trailing
      #    hotfix-style marker the upstream tag might carry (e.g. "-hotfix.1"),
      #    so a hotfix tag like "v1.62.7-hotfix.1" becomes
      #    "v1.62.7.1-hotfix.1" rather than "v1.62.7-hotfix.1.1".
      - name: Get latest upstream release tag
        id: upstream_info
        run: |
          TAG=$(gh release list -R ${{ env.UPSTREAM_REPO }} -L 1 --json tagName --jq '.[0].tagName')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          if [ -n "$TAG" ]; then
            if [[ "$TAG" =~ ^(v?[0-9]+(\.[0-9]+){1,3})(.*)$ ]]; then
              VERSION_CORE="${BASH_REMATCH[1]}"
              TAG_REMAINDER="${BASH_REMATCH[3]}"
            else
              # Tag didn't match the expected "vX.Y[.Z[.W]]" pattern at all;
              # fall back to appending the suffix at the very end so the
              # workflow doesn't crash on an unexpected tag format.
              VERSION_CORE="$TAG"
              TAG_REMAINDER=""
            fi
            NEW_TAG="${VERSION_CORE}${{ env.RELEASE_TAG_SUFFFIX }}${TAG_REMAINDER}"
            echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # 7. Check if we already synced this specific release. We check for the
      #    GitHub *release*, not just the git tag - a tag can already exist
      #    from a prior run that pushed the tag but then failed before
      #    creating the release, and we still want to retry release creation
      #    in that case.
      - name: Check if release already synced
        id: check
        if: steps.upstream_info.outputs.tag != ''
        run: |
          NEW_TAG="${{ steps.upstream_info.outputs.new_tag }}"
          if gh release view "$NEW_TAG" -R ${{ github.repository }} >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # 8. --- YOUR CUSTOM PART: CREATE THE RELEASE ---
      - name: Create your own Release from the synced commit
        if: steps.check.outputs.exists == 'false' && steps.upstream_info.outputs.tag != ''
        run: |
          UPSTREAM_TAG="${{ steps.upstream_info.outputs.tag }}"
          NEW_TAG="${{ steps.upstream_info.outputs.new_tag }}"
          # HEAD is now the merged commit from step 5.
          # Tag that commit and push the tag, unless it's already there
          # (e.g. left over from a prior run that failed after tagging
          # but before the release was created).
          if ! git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            git tag "$NEW_TAG"
            git push origin "$NEW_TAG"
          fi
          # Create the GitHub Release in your fork
          # (-R is required: gh defaults fork-aware commands to the parent/
          # upstream repo, not this one, unless told otherwise)
          gh release create "$NEW_TAG" \
            -R ${{ github.repository }} \
            --title "$NEW_TAG" \
            --notes "Auto-merge with ${UPSTREAM_TAG} from original Lailloken's repo. Thanks for updates for your tool :3"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
